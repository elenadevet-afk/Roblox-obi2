<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Game Builder v9.0</title>
    <style>
        :root { --accent: #bc13fe; --bg: #111; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #fff; }
        #panel { width: 380px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid var(--accent); }
        .card { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        input { width: 100%; padding: 8px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #00f7ff; box-sizing: border-box; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 10px; display: block; }
        #view { flex-grow: 1; padding: 20px; background: #000; }
        .win-frame { width: 100%; height: 600px; border: 1px solid #333; border-radius: 15px; overflow: hidden; background: #050505; }
        .btn-copy { background: var(--accent); color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .lang-switch { float: right; background: #333; color: #fff; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="panel">
    <button class="lang-switch" onclick="toggleLang()">EN / RU</button>
    <h2 id="t-title">Редактор v9.0</h2>
    
    <label id="l-hero">Герой (PNG URL):</label>
    <input type="text" id="h-url" value="https://cdn-icons-png.flaticon.com/512/616/616430.png" oninput="refresh()">
    
    <label id="l-col">Цвет платформ:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="refresh()">

    <label id="l-win">Победа:</label>
    <input type="text" id="m-win" value="EXCELLENT! MISSION COMPLETE" oninput="refresh()">

    <label id="l-lose">Проигрыш:</label>
    <input type="text" id="m-lose" value="GAME OVER! TRY AGAIN" oninput="refresh()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyIt()" id="t-copy">КОПИРОВАТЬ ДЛЯ GENIALLY</button>
</div>

<div id="view">
    <div id="f-box" class="win-frame"></div>
</div>

<script>
    let lang = 'ru';
    const ui = {
        ru: { title: "Редактор v9.0", hero: "Герой (PNG URL)", col: "Цвет", win: "Победа", lose: "Проигрыш", copy: "КОПИРОВАТЬ ДЛЯ GENIALLY", alert: "Код скопирован!" },
        en: { title: "Editor v9.0", hero: "Hero URL", col: "Color", win: "Win", lose: "Lose", copy: "COPY FOR GENIALLY", alert: "Copied!" }
    };

    let qs = Array(14).fill().map((_, i) => ({ q: `Вопрос ${i+1}?`, a: ["Верно", "Нет", "Нет"], c: 0 }));

    function toggleLang() {
        lang = (lang === 'ru') ? 'en' : 'ru';
        document.getElementById('t-title').innerText = ui[lang].title;
        document.getElementById('l-hero').innerText = ui[lang].hero;
        document.getElementById('l-col').innerText = ui[lang].col;
        document.getElementById('l-win').innerText = ui[lang].win;
        document.getElementById('l-lose').innerText = ui[lang].lose;
        document.getElementById('t-copy').innerText = ui[lang].copy;
        render();
    }

    function render() {
        const c = document.getElementById('q-list');
        c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<input type="text" value="${q.q}" oninput="qs[${i}].q=this.value;refresh()">
            <div style="display:flex;gap:2px"><input type="text" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;refresh()"><input type="text" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;refresh()"><input type="text" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;refresh()"></div>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const h = document.getElementById('h-url').value;
        const col = document.getElementById('h-col').value;
        const wM = document.getElementById('m-win').value;
        const lM = document.getElementById('m-lose').value;
        const data = JSON.stringify(qs);

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;overflow:hidden;background:#000;height:600px;width:100%;font-family:sans-serif}.world{position:relative;width:100%;height:100%;overflow:hidden}.p{position:absolute;width:60px;height:20px;background:${col};border-radius:10px;box-shadow:0 5px 15px ${col}66;transition:0.5s;opacity:0.3}.p.active{opacity:1;border:2px solid #fff}#hero{position:absolute;width:50px;height:60px;z-index:10;transition:0.5s;bottom:0}#q{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,20,0.95);border:2px solid ${col};border-radius:20px;padding:20px;width:280px;color:#fff;text-align:center;z-index:100;backdrop-filter:blur(10px)}.bt{background:rgba(255,255,255,0.1);border:1px solid ${col};color:#fff;width:100%;padding:10px;margin:5px 0;border-radius:10px;cursor:pointer;font-weight:bold}#stats{position:absolute;top:10px;left:10px;color:#fff;z-index:110;display:flex;gap:10px}.stat{background:rgba(0,0,0,0.8);padding:5px 10px;border-radius:8px;border:1px solid ${col};font-size:12px}</style></head><body><div class="world" id="w"><div id="stats"><div class="stat" id="hp">❤️ ❤️ ❤️</div><div class="stat" id="st">STEP: 1/14</div></div><img id="hero" src="${h}"><div id="q"><div id="qt" style="font-size:18px;margin-bottom:15px"></div><div id="as"></div></div></div><script>const tasks=${data};let cur=0,liv=3;const w=document.getElementById("w");const hero=document.getElementById("hero");const pls=[];for(let i=0;i<15;i++){const p=document.createElement("div");p.className="p";const x=20+(i*55);const y=520-(i*30);p.style.left=x+"px";p.style.top=y+"px";w.appendChild(p);pls.push(p)}function updH(){const target=pls[cur];hero.style.left=(parseInt(target.style.left)+5)+"px";hero.style.top=(parseInt(target.style.top)-60)+"px";pls.forEach((p,i)=>p.classList.toggle("active",i<=cur))}function uQ(){if(cur>=14){f(true);return}document.getElementById("st").innerText="STEP: "+(cur+1)+"/14";document.getElementById("q").style.display="block";document.getElementById("qt").innerText=tasks[cur].q;const b=document.getElementById("as");b.innerHTML="";tasks[cur].a.forEach((t,i)=>{const btn=document.createElement("button");btn.className="bt";btn.innerText=t;btn.onclick=()=>{if(i===0){cur++;document.getElementById("q").style.display="none";updH();setTimeout(uQ,600)}else{liv--;document.getElementById("hp").innerText="❤️ ".repeat(liv);if(liv<=0)f(false)}};b.appendChild(btn)})}function f(win){const box=document.getElementById("q");box.style.display="block";box.innerHTML="<h2>"+(win?"${wM}":"${lM}")+"</h2><button class=\'bt\' onclick=\'location.reload()\'>RESTART</button>"}updH();uQ();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`.replace(/\n/g, '');
    }

    function refresh() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() { const el = document.createElement('textarea'); el.value = getCode(); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert(ui[lang].alert); }
    render(); refresh();
</script>
</body>
</html>
